<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>LED Asset Review · Tests</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 960px; margin: 0 auto; }
    .pass { color: #0d8043; }
    .fail { color: #d93025; font-weight: bold; }
    .summary { margin: 20px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
    pre { background: #fafafa; padding: 8px; border-radius: 3px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🧪 LED Asset Review · Unit Tests</h1>
  <div id="summary" class="summary">运行中…</div>
  <div id="results"></div>

  <script src="./app.js"></script>
  <script>
    const results = [];
    let passed = 0, failed = 0;

    function assertEq(actual, expected, label) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      const cls = ok ? 'pass' : 'fail';
      const sym = ok ? '✓' : '✗';
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = `${sym} ${label}`;
      if (!ok) {
        const pre = document.createElement('pre');
        pre.textContent = `  expected: ${JSON.stringify(expected)}\n  actual:   ${JSON.stringify(actual)}`;
        div.appendChild(pre);
      }
      document.getElementById('results').appendChild(div);
      if (ok) passed++; else failed++;
    }

    function assertThrows(fn, label) {
      try {
        fn();
        const div = document.createElement('div');
        div.className = 'fail';
        div.textContent = `✗ ${label} (expected throw, got nothing)`;
        document.getElementById('results').appendChild(div);
        failed++;
      } catch (e) {
        const div = document.createElement('div');
        div.className = 'pass';
        div.textContent = `✓ ${label}`;
        document.getElementById('results').appendChild(div);
        passed++;
      }
    }

    // —— Stub test ——
    assertEq(CapabilityDetector.detect().copy, typeof navigator.clipboard?.writeText === 'function', 'CapabilityDetector detects clipboard');

    // —— RuleParser ——
    const SAMPLE_SKILL = `# LED Test Doc

### 字段 3：场景气氛时间
| 中文 | 代码 |
|---|---|
| 日出前 | \`BSR\` — Before Sunrise |
| 上午 | \`FN\` — Forenoon |
| 中午 | \`Nn\` — Noon |
| 夜晚 | \`NT\` — Night |
| 黄昏转夜晚 | \`NF-NT\` — Nightfall-to-Night |

### 字段 4：场景天气状态
| 中文 | 代码 |
|---|---|
| 正常天气 | \`N\` — Normal |
| 阴天 | \`CS\` — Cloudy_Sky |
| 下雨 | \`R\` — Rain |

### 字段 5a：制作方式描述（用于最终视频成品）
| 中文 | 代码 |
|---|---|
| 全实拍场景 | \`RS\` — RealShot |
| 全 CG 视效 | \`VE\` — VFX/Engine |

### 字段 6：版本号
同一对象不同版本：\`V01 / V02 / V03\`，恒为两位数，前缀 \`V\` 大写。

### 字段 2：镜头序号
车拍：\`101-F、102-R、103-B、104-L、105-T\`

## Quick Reference — 五种命名方式
| 最终视频成品 | \`场景_序号_气氛时间_天气_制作方式_版本\` | \`LXZC_1_NT_N_RS_V01\` |
| 摄影机原始素材文件夹 | \`场景_序号_气氛时间_天气_M\` | \`LXZC_1_NT_N_M\` |
| 序列帧文件 | \`场景_序号_气氛时间_天气_制作工序_版本_序列帧号.ext\` | \`LXZC_1_NT_N_CP_V01_00502.dpx\` |`;

    const rules = RuleParser.parse(SAMPLE_SKILL);
    assertEq(rules.timeCodes.NT, '夜晚', '时间码 NT → 夜晚');
    assertEq(rules.timeCodes.FN, '上午', '时间码 FN → 上午');
    assertEq(rules.timeCodes['NF-NT'], '黄昏转夜晚', '时间码 NF-NT（连字符字段内部）');
    assertEq(rules.weatherCodes.N, '正常天气', '天气码 N → 正常天气');
    assertEq(rules.weatherCodes.R, '下雨', '天气码 R → 下雨');
    assertEq(rules.methods.video.RS, '全实拍场景', '制作方式 RS');
    assertEq(rules.methods.video.VE, '全 CG 视效', '制作方式 VE');
    assertEq(rules.versionPattern.test('V01'), true, '版本号 V01 合法');
    assertEq(rules.versionPattern.test('V1'), false, '版本号 V1 非法');
    assertEq(rules.shotPattern.test('101-F'), true, '车拍镜号 101-F');
    assertEq(rules.shotPattern.test('1'), true, '普通镜号 1');
    assertEq(rules.sequencePattern.test('00502'), true, '序列帧 00502');
    assertEq(rules.extOptions, ['.mov', '.mp4'], '视频扩展名白名单');
    assertEq(rules.seqExtOptions, ['.dpx', '.exr', '.tiff'], '序列帧扩展名白名单');

    // —— ScanEngine.validate: segment count + field 1 ——
    const r = rules;
    const opts = { projectMode: true, checkSeqExt: true };
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_V01.mov', '', r, opts).issues,
      [],
      '通用规范正确样例 0 issues'
    );
    assertEq(
      ScanEngine.validate('L_1_NT_N_RS_V01.mov', '', r, opts).issues[0].tag,
      '场景码非法',
      '场景码 1 字符过短（< 2）'
    );
    assertEq(
      ScanEngine.validate('LXZCXZABCDE_1_NT_N_RS_V01.mov', '', r, opts).issues[0].tag,
      '场景码非法',
      '场景码 11 字符超长（> 10 范围）'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_NRS_V01.mov', '', r, opts).issues[0].tag,
      '段数错',
      'NRS 黏合导致段数 5 而非 6'
    );
    assertEq(
      ScanEngine.validate('ab_1_NT_N_RS_V01.mov', '', r, opts).issues[0].tag,
      '场景码非法',
      '场景码含小写字母'
    );

    // —— ScanEngine.validate: fields 2-6 ——
    assertEq(
      ScanEngine.validate('LXZC_X_NT_N_RS_V01.mov', '', r, opts).issues.find(i => i.tag === '镜号格式错')?.tag,
      '镜号格式错',
      '镜号非数字'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NIGHT_N_RS_V01.mov', '', r, opts).issues.find(i => i.tag === '时间码未知')?.tag,
      '时间码未知',
      '时间码 NIGHT 不在字典'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_RAIN_RS_V01.mov', '', r, opts).issues.find(i => i.tag === '天气码未知')?.tag,
      '天气码未知',
      '天气码 RAIN 不在字典'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_XX_V01.mov', '', r, opts).issues.find(i => i.tag === '工序码未知')?.tag,
      '工序码未知',
      '工序码 XX 不在字典'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_v1.mov', '', r, opts).issues.find(i => i.tag === '版本号格式错')?.tag,
      '版本号格式错',
      '版本号 v1 小写'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_V1.mov', '', r, opts).issues.find(i => i.tag === '版本号格式错')?.tag,
      '版本号格式错',
      '版本号 V1 一位'
    );
    // Camera-original `_M` ends without version: should NOT trigger 版本号格式错
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_M', '', r, opts).issues.find(i => i.tag === '版本号格式错'),
      undefined,
      '摄影原始素材 _M 结尾无需版本号'
    );

    // —— Sequence frame extension check ——
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_CP_V01_00502.png', '', r, opts).issues.find(i => i.tag === '序列帧扩展名错')?.tag,
      '序列帧扩展名错',
      '序列帧 .png 非法'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_CP_V01_00502.dpx', '', r, opts).issues.find(i => i.tag === '序列帧扩展名错'),
      undefined,
      '序列帧 .dpx 合法'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_CP_V01_00502.jpg', '', { ...r, seqExtOptions: ['.png', '.jpg'] }, { ...opts, checkSeqExt: true }).issues.find(i => i.tag === '序列帧扩展名错'),
      undefined,
      '序列帧 .jpg 在白名单中（自定义 seqExtOptions）'
    );

    // —— Project override check (项目级约定) ——
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_V01.mov', '常州 戚墅街道', r, { projectMode: true, checkSeqExt: true }).issues.find(i => i.tag === '项目约定违反')?.tag,
      '项目约定违反',
      '父目录含半角空格触发项目级警告'
    );
    assertEq(
      ScanEngine.validate('LX ZC_1_NT_N_RS_V01.mov', '常州戚墅街道', r, { projectMode: true, checkSeqExt: true }).issues.find(i => i.tag === '项目约定违反')?.tag,
      '项目约定违反',
      '文件名含半角空格触发项目级警告'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_V01.mov', '常州戚墅街道', r, { projectMode: true, checkSeqExt: true }).issues.find(i => i.tag === '项目约定违反'),
      undefined,
      '无空格时不触发'
    );
    assertEq(
      ScanEngine.validate('LXZC_1_NT_N_RS_V01.mov', '常州 戚墅街道', r, { projectMode: false, checkSeqExt: true }).issues.find(i => i.tag === '项目约定违反'),
      undefined,
      '关闭项目模式时不触发'
    );

    // —— ScanEngine.suggestName ——
    // 场景：NRS 黏合 → 拆成 N_RS
    assertEq(
      ScanEngine.suggestName('CZQSJD_101-F_FN_NRS_V01.mov', [], r),
      'CZQSJD_101-F_FN_N_RS_V01.mov',
      'NRS 黏合 → N_RS'
    );
    // 场景：版本号格式错 v1 → V01
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT_N_RS_v1.mov', [], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '版本号 v1 → V01'
    );
    // 场景：名字无违规 → 原样返回
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT_N_RS_V01.mov', [], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '无违规原样返回'
    );
    // 场景：段数错 + 无可恢复黏合 → 返回 null
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT.mov', [{ tag: '段数错' }], r),
      null,
      '段数错且无黏合可恢复 → null'
    );
    // 场景：NRS 黏合导致段数 5 → 拆出 N_RS
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT_NRS_V01.mov', [{ tag: '段数错' }], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '段数错 + NRS 黏合 → N_RS'
    );
    // 场景：FNNRS 多步黏合（FN + N + RS）→ 拆出三段
    assertEq(
      ScanEngine.suggestName('LXZC_1_FNNRS_V01.mov', [{ tag: '段数错' }], r),
      'LXZC_1_FN_N_RS_V01.mov',
      '段数错 + 多步黏合 FNNRS → FN + N + RS'
    );
    // 场景：NRS 黏合 + 段数正确 → 走 NRS 路径（验证 NRS 仍能正常修复）
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT_N_RS_V01.mov', [], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '无违规原样返回（被拆成 6 段后段数对，零变更）'
    );
    // 场景：NRS 黏合 + 版本号 v1 两位化 + 段数错 → 一次性修复
    assertEq(
      ScanEngine.suggestName('LXZC_1_NT_NRSv1.mov', [{ tag: '段数错' }], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '段数错 + NRS + v1 → 全部修复'
    );
    // 场景：去空格后段数变对 + 黏合可拆 → 一次过
    assertEq(
      ScanEngine.suggestName('LX ZC_1_NT_NRS_V01.mov', [{ tag: '段数错' }], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '段数错 + 空格 + NRS 黏合 → 一次过'
    );
    // 场景：名字含空格 → 去掉空格
    assertEq(
      ScanEngine.suggestName('LX ZC_1_NT_N_RS_V01.mov', [], r),
      'LXZC_1_NT_N_RS_V01.mov',
      '去空格'
    );

    // —— T20: 项目约定检查必须与段数错正交（用户实测 case）——
    const userCase = ScanEngine.validate(
      'CZ QSJD_101-F_FN_NRS_V01.jpg', '', r, { projectMode: true, checkSeqExt: true }
    );
    assertEq(
      userCase.issues.map(i => i.tag).sort(),
      ['段数错', '项目约定违反'],
      'T20: 段数错 + 空格同时报告（不互相吞）'
    );
    assertEq(
      ScanEngine.suggestName('CZ QSJD_101-F_FN_NRS_V01.jpg', userCase.issues, r),
      'CZQSJD_101-F_FN_N_RS_V01.jpg',
      'T20: 用户实测 case 一次修两个（去空格 + 拆 NRS）'
    );

    // —— T21: validate() 只报 issues，建议名必须由调用方单独调 suggestName() ——
    assertEq(
      Object.keys(ScanEngine.validate('LXZC_1_NT_NRS_V01.mov', '', r, opts)).sort(),
      ['issues'],
      'T21: validate() 不再返回 suggestedName（避免 UI 误用）'
    );
    // 模拟 UI 流程：validate 拿到 issues → 单独调 suggestName → 拿到建议名
    const flow = ScanEngine.validate('LXZC_1_NT_NRS_V01.mov', '', r, opts);
    const flowSuggestion = ScanEngine.suggestName('LXZC_1_NT_NRS_V01.mov', flow.issues, r);
    assertEq(
      flowSuggestion,
      'LXZC_1_NT_N_RS_V01.mov',
      'T21: UI 流程（validate + suggestName）能拿到建议名'
    );

    // —— XlsxTableParser (with stubbed XLSX) ——
    // Stub XLSX + pinyin so the new module's logic can be tested without
    // a real network round-trip. Real integration test (against the actual
    // fixture.xlsx) is added at the bottom of this block, gated on the
    // real libs being loaded by the page.
    const iqiyiHeaders = [
      '序号', '文件命名', '场景名称', '拍摄地理名称（素材拍摄位置）',
      '拍摄地理位置（视效合成视频需要拍摄素材位置）\n经纬度', '场景简介', '内景/外景',
      '气氛时间', '天气', '主要出现集数及场次\n（如不清楚可不填）',
      '播放素材截图', '\n视频格式\n建议ProRes422HQ',
      '原始拍摄素材文件名称', '视频时长', '备注'
    ];
    const iqiyiGrid = [
      ['LED大屏播放素材统计表'],
      ['填写日期：', '2026-06-15'],
      iqiyiHeaders,
      [1, '1-1Apple ProRes 422 HQ 4500x1400 05m00s_000001', '青梧镇街道', '乐山市王坎',
       '29.63,103.77', '街道周围环境', '外景', '上午', '晴天', null, null, '是', '否', null, null],
      [2, '1-2Apple ProRes 422 HQ 4500x1400 05m00s_000002', '青梧镇街道', '乐山市王坎',
       '29.63,103.77', '街道周围环境', '外景', '中午', '晴天', null, null, '是', '否', null, null],
      [3, '1-3Apple ProRes 422 HQ 4500x1400 05m00s_000003', '青梧镇街道', '乐山市王坎',
       '29.63,103.77', '街道周围环境', '外景', '下午', '阴天', null, null, '是', '否', null, null],
      [4, '1-4M_Raw_Cam_4500x1400_000001', '青梧镇街道', '乐山市王坎',
       '29.63,103.77', '街道周围环境', '外景', '上午', '晴天', null, null, '否', '是', null, null],
      [],  // empty row (sentinel for end of data)
      ['填表人：', '张三']  // footer — should be ignored
    ];
    window.XLSX = {
      read: () => ({ Sheets: { 'LED大屏播放素材': {} }, SheetNames: ['LED大屏播放素材'] }),
      utils: {
        sheet_to_json: () => iqiyiGrid
      }
    };
    // Stub pinyin: real impls return arrays; map known Chinese names
    // explicitly so the test doesn't depend on pinyin-pro being loaded.
    window.pinyin = (str, opts) => {
      if (str === '青梧镇街道') return ['q','w','z','j','d'];
      if (str === '理想之城') return ['l','x','z','c'];
      if (str === '青梧镇') return ['q','w','z'];
      return str.split('').map(c => c);  // pass-through (1:1) for unknown
    };

    const parsed = XlsxTableParser.parse(new ArrayBuffer(0));
    assertEq(parsed.rows.length, 4, 'XlsxTableParser parses 4 data rows (skips empty + footer)');
    assertEq(parsed.rows[0].serial, 1, 'XlsxTableParser row 0 序号 = 1');
    assertEq(parsed.rows[0].sceneName, '青梧镇街道', 'XlsxTableParser row 0 场景名');
    assertEq(parsed.rows[0].location, '乐山市王坎', 'XlsxTableParser row 0 拍摄地');
    assertEq(parsed.rows[0].time, '上午', 'XlsxTableParser row 0 时间');
    assertEq(parsed.rows[0].weather, '晴天', 'XlsxTableParser row 0 天气');
    assertEq(parsed.rows[0].isCameraOriginal, false, 'XlsxTableParser row 0 摄影机原始素材=否');
    assertEq(parsed.rows[3].isCameraOriginal, true, 'XlsxTableParser row 3 摄影机原始素材=是');

    // Header row missing → throw
    assertThrows(() => {
      window.XLSX.utils.sheet_to_json = () => [['no 序号 here'], ['something']];
      XlsxTableParser.parse(new ArrayBuffer(0));
    }, 'XlsxTableParser throws when 序号 column missing');

    // —— XlsxNamer (with stubbed pinyin) ——
    const xRules = rules;  // reuse the SAMPLE_SKILL rules parsed above
    const sampleRow = {
      serial: 1, currentName: '1-1Apple...', sceneName: '青梧镇街道', location: '乐山市王坎',
      time: '上午', weather: '晴天', format: '是', isCameraOriginal: false
    };

    // Standard final video
    let xr = XlsxNamer.build(sampleRow, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_FN_N_RS_V01', 'XlsxNamer: 青梧镇/上午/晴天/否/RS → QWZJD_1_FN_N_RS_V01');
    assertEq(xr.status, 'ok', 'XlsxNamer: 晴天+标准 = ok');

    // 中午 → Nn (case sensitivity, lowercase n!)
    xr = XlsxNamer.build({ ...sampleRow, time: '中午' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_Nn_N_RS_V01', 'XlsxNamer: 中午 → Nn (lowercase n)');

    // 阴天 → CS
    xr = XlsxNamer.build({ ...sampleRow, weather: '阴天' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_FN_CS_RS_V01', 'XlsxNamer: 阴天 → CS');

    // 傍晚 (不在 SKILL.md 字典) → NF
    xr = XlsxNamer.build({ ...sampleRow, time: '傍晚' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_NF_N_RS_V01', 'XlsxNamer: 傍晚 (not in spec) → NF fallback');

    // 摄影机原始素材=是 → _M 模式 (无版本号)
    xr = XlsxNamer.build({ ...sampleRow, isCameraOriginal: true }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_FN_N_M', 'XlsxNamer: 摄影机原始素材 → _M suffix, no version');

    // 视频格式=否 → warning
    xr = XlsxNamer.build({ ...sampleRow, format: '否' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.status, 'warn', 'XlsxNamer: 视频格式=否 → status warn');
    assertEq(xr.warnings.includes('视频格式未达到 ProRes422HQ 建议'), true, 'XlsxNamer: format=否 warning text');

    // 空场景名 → err
    xr = XlsxNamer.build({ ...sampleRow, sceneName: '' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.status, 'err', 'XlsxNamer: 空场景名 → err');
    assertEq(xr.name, null, 'XlsxNamer: err 时 name=null');

    // 未知时间 → err
    xr = XlsxNamer.build({ ...sampleRow, time: '凌晨' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.status, 'err', 'XlsxNamer: 未知时间 → err');

    // 未知天气 → err
    xr = XlsxNamer.build({ ...sampleRow, weather: '沙尘暴' }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.status, 'err', 'XlsxNamer: 未知天气 → err');

    // 不同 method 切换
    xr = XlsxNamer.build(sampleRow, xRules, { method: 'VE', shotCode: '1' });
    assertEq(xr.name, 'QWZJD_1_FN_N_VE_V01', 'XlsxNamer: method=VE 切换');

    // 理想之城 / 夜晚 / 阴天 / 摄影机原始 → LXZC_1_NT_CS_M
    xr = XlsxNamer.build({
      serial: 99, currentName: '99-Mraw.mov', sceneName: '理想之城', location: '上海市外滩',
      time: '夜晚', weather: '阴天', format: '是', isCameraOriginal: true
    }, xRules, { method: 'RS', shotCode: '1' });
    assertEq(xr.name, 'LXZC_1_NT_CS_M', 'XlsxNamer: 理想之城/夜晚/阴天/原始素材 → LXZC_1_NT_CS_M');

    // —— XlsxNamer.computeShotMap ——
    const shotRows = [
      { location: '乐山市王坎', currentName: '1-1Apple...' },
      { location: '乐山市王坎', currentName: '1-2Apple...' },
      { location: '乐山市石桥', currentName: '2-1Apple...' },
      { location: '乐山市邵村', currentName: '3-1Apple...' }
    ];
    const shotMap = XlsxNamer.computeShotMap(shotRows);
    assertEq(shotMap['乐山市王坎'], '1', 'computeShotMap: 王坎 → 1');
    assertEq(shotMap['乐山市石桥'], '2', 'computeShotMap: 石桥 → 2');
    assertEq(shotMap['乐山市邵村'], '3', 'computeShotMap: 邵村 → 3');
    assertEq(shotRows[0]._shotCode, '1', 'computeShotMap: row 0 镜头 = 1');
    assertEq(shotRows[2]._shotCode, '2', 'computeShotMap: row 2 镜头 = 2');

    // 空 location → fallback to currentName prefix
    const fallbackRows = [
      { location: '', currentName: '5-3Apple...' },
      { location: '', currentName: 'Apple ProRes...' }
    ];
    XlsxNamer.computeShotMap(fallbackRows);
    assertEq(fallbackRows[0]._shotCode, '5', 'computeShotMap: 空 location, parse N-x prefix');
    assertEq(fallbackRows[1]._shotCode, '1', 'computeShotMap: 空 location + 无 prefix → 1');
    assertEq(fallbackRows[1]._shotFallback, true, 'computeShotMap: 落到默认 1 时标 _shotFallback');

    // —— ScanEngine.walkFileTree (integration with FileSystemFileHandle) ——
    // This test requires a user gesture to open the directory picker, so it
    // is only meaningful in an interactive browser session. Skip in headless
    // (or whenever the page was loaded without a click). Run only when the
    // URL has ?walk=1 (interactive click-to-test).
    async function testWalk() {
      if (typeof window.showDirectoryPicker !== 'function') {
        const div = document.createElement('div');
        div.className = 'pass';
        div.textContent = '✓ walkFileTree (skipped: needs FileSystemFileHandle)';
        document.getElementById('results').appendChild(div);
        passed++;
        return;
      }
      if (new URLSearchParams(location.search).get('walk') !== '1') {
        const div = document.createElement('div');
        div.className = 'pass';
        div.textContent = '✓ walkFileTree (skipped: needs user gesture; add ?walk=1)';
        document.getElementById('results').appendChild(div);
        passed++;
        return;
      }
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      const entries = [];
      await ScanEngine.walkFileTree(handle, (entry) => {
        entries.push({ name: entry.name, kind: entry.kind });
      });
      assertEq(entries.length > 0, true, `walkFileTree found ${entries.length} entries`);
    }
    const walkPromise = testWalk().catch(e => {
      const div = document.createElement('div');
      div.className = 'fail';
      div.textContent = `✗ walkFileTree: ${e.message}`;
      document.getElementById('results').appendChild(div);
      failed++;
    });

    // —— Summary ——
    function updateSummary() {
      document.getElementById('summary').textContent =
        failed === 0 ? `✅ ${passed} passed, 0 failed` : `❌ ${passed} passed, ${failed} failed`;
      document.title = failed === 0 ? `✅ ${passed} passed` : `❌ ${failed} failed`;
    }
    updateSummary();
    // testWalk is async; refresh summary after it settles.
    walkPromise.then(updateSummary, updateSummary);
  </script>
</body>
